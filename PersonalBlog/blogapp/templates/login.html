
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --ink: #0e0e0e;
      --cream: #f5f0e8;
      --muted: #7a7570;
    }

    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0e0e0e;
      background-image:
        radial-gradient(ellipse 70% 60% at 20% 80%, rgba(201,168,76,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(201,168,76,0.10) 0%, transparent 55%),
        linear-gradient(135deg, #0e0e0e 0%, #1a1610 50%, #0e0e0e 100%);
      background-attachment: fixed;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .login-card {
      position: relative;
      z-index: 1;
      background: rgba(245, 240, 232, 0.97);
      border-radius: 0;
      padding: 52px 48px;
      width: 100%;
      max-width: 420px;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.25),
        0 30px 80px rgba(0,0,0,0.5),
        0 0 60px rgba(201,168,76,0.06);
      animation: fadeUp 0.65s cubic-bezier(.22,.68,0,1.1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 36px;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 2.4rem;
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .card-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 36px;
    }

    .form-label {
      font-size: 0.67rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-control {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid #c8bfb0;
      border-radius: 0;
      padding: 10px 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--ink);
      transition: border-color 0.25s;
      box-shadow: none !important;
    }

    .form-control:focus {
      background: transparent;
      border-bottom-color: var(--gold);
      color: var(--ink);
    }

    .form-control::placeholder { color: #bbb5aa; font-weight: 300; }

    .form-group { margin-bottom: 28px; }

    .row-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }

    .form-check-label { font-size: 0.78rem; color: var(--muted); }
    .form-check-input:checked { background-color: var(--gold); border-color: var(--gold); }

    .forgot-link {
      font-size: 0.78rem;
      color: var(--gold);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .forgot-link:hover { opacity: 0.65; color: var(--gold); }

    .btn-login {
      width: 100%;
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: 0;
      padding: 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.73rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-weight: 500;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: color 0.35s;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s cubic-bezier(.22,.68,0,1);
      z-index: 0;
    }

    .btn-login:hover::after { transform: scaleX(1); }
    .btn-login span { position: relative; z-index: 1; }


  </style>
</head>
<body>

  <div class="login-card">
     {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}
    <div class="brand">ADMIN</div>

    <h2 class="card-title">Welcome back.</h2>
    <p class="card-subtitle">Sign in to your account to continue.</p>

    <form method="POST">
         {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" class="form-control" name="username" id="username" placeholder="Your Username" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-control" name="password" id="password" placeholder="••••••••" />
      </div>

      <!-- <div class="row-options">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember" />
          <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div> -->

      <button type="submit" class="btn-login">
        <span>Sign In</span>
      </button>
    </form>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
